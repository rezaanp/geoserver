version: '3.8'

services:

  postgis:
    image: postgis/postgis:15-3.4
    container_name: postgis
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geopassword}
      POSTGRES_DB: ${POSTGRES_DB:-geodata}
      TZ: Asia/Jakarta
    volumes:
      - ./data/postgis:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Host:Container (opsional, untuk akses external)
    networks:
      - geonet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  geoserver:
    image: docker.osgeo.org/geoserver:2.24.2
    container_name: geoserver
    environment:
      TZ: Asia/Jakarta
      # Koneksi ke PostGIS (internal docker network)
      GEOSERVER_DATA_DIR: /opt/geoserver_data
    volumes:
      - ./data/geoserver:/opt/geoserver_data
    ports:
      - "8082:8080"  # Akses GeoServer via http://IP:8082/geoserver
    depends_on:
      postgis:
        condition: service_healthy
    networks:
      - geonet
    restart: unless-stopped

networks:
  geonet:
    driver: bridge